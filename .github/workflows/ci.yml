name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & Test (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node20-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-modules-

      - name: Install dependencies
        run: npm ci

      - name: Run lint (if defined)
        run: |
          if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script defined — skipping."
          fi

      - name: Run tests
        run: npm test
